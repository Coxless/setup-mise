name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: ./
        with:
          config_file: mise.toml

      - name: Verify node version
        run: node --version | grep -q "^v24\."

      - name: Verify pnpm version
        run: pnpm --version | grep -q "^10\."

  test-no-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise (cache disabled)
        uses: ./
        with:
          config_file: mise.toml
          cache: 'false'

      - name: Verify node version
        run: node --version | grep -q "^v24\."

  test-no-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise (install disabled)
        uses: ./
        with:
          config_file: mise.toml
          install: 'false'

      - name: Verify mise binary is available
        run: mise --version
